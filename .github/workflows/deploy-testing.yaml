name: Deploy Soul Mirror Reading (FTP testing)

on:
  push:
    branches:
      - testing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, mbstring
          coverage: none

      - name: Install Composer dependencies (with dev for PHPUnit)
        run: composer install --no-interaction

      - name: Run PHPUnit
        run: composer test

  ftp-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, mbstring
          coverage: none

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy

          cp -a public deploy/
          cp -a src deploy/
          cp -a vendor deploy/
          cp -a member deploy/

          if [ -f composer.json ]; then cp composer.json deploy/; fi
          if [ -f composer.lock ]; then cp composer.lock deploy/; fi
          if [ -f index.php ]; then cp index.php deploy/; fi

      - name: FTP deploy to cPanel (testing subdomain) with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            npx -y ftp-deploy@4.3.6 \
              --server="${{ secrets.FTP_SERVER }}" \
              --username="${{ secrets.FTP_USERNAME }}" \
              --password="${{ secrets.FTP_PASSWORD }}" \
              --server-dir="/test.soulmirrorreading.com/" \
              --local-dir="./deploy/" \
              --protocol="ftps" \
              --timeout=300000 \
              --log-level="verbose" \
              --exclude="**/.git/**" \
              --exclude="**/.github/**" \
              --exclude="**/.cursor/**" \
              --exclude="**/.env" \
              --exclude="**/node_modules/**" \
              --exclude="**/tests/**" \
              --exclude="**/phpunit.xml" \
              --exclude="**/.phpunit.cache/**" \
              --exclude="**/*.md" \
              --exclude="**/README*"