name: Deploy (Testing)

on:
  push:
    branches:
      - testing

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # PHP
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - run: composer install --no-dev --optimize-autoloader --no-interaction

      # Frontend (only if needed)
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci && npm run build

      # Clean deploy folder
      - name: Prepare deployment
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            ./ deploy/

      # SSH Agent
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ✅ FIXED SSH SETUP (robust)
      - name: Setup SSH
        run: |
          set -e

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          # Try to add known_hosts (safe, but may fail on cPanel)
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H "${{ secrets.SSH_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

          chmod 644 "$HOME/.ssh/known_hosts"

      # 🚀 Deploy to TESTING (cPanel-safe)
      - name: Deploy to staging
        run: |
          rsync -avz --delete \
            --exclude='uploads' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./deploy/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_REMOTE_PATH_TESTING }}