<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Soul Mirror Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text: #1e160e;
      --gold: #9a7230;
      --gold-light: #c4a052;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(170deg, #c9c0e0 0%, #dfd9eb 40%, #eee9f4 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(154, 114, 48, 0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(154, 114, 48, 0.04) 0%, transparent 60%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #e8c97a;
      margin-bottom: 24px;
      padding: 8px 22px;
      border: 1px solid rgba(196, 160, 82, 0.6);
      border-radius: 30px;
      background: linear-gradient(135deg, #3b1f6e 0%, #5a3090 100%);
      box-shadow: 0 2px 12px rgba(59, 31, 110, 0.35);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    p {
      font-size: 1.15rem;
      line-height: 1.65;
      opacity: 0.92;
      margin-bottom: 28px;
    }

    a {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid var(--gold-light);
      padding-bottom: 2px;
    }

    a:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="eyebrow">Soul Mirror</div>
    <h1>Your reading is <em>on its way</em></h1>
    <p>Check your inbox for your personalized Soul Mirror Reading. If you do not see it within a few minutes, peek in
      your promotions or spam folder.</p>
    <p><a href="index.html">Back to the reading</a></p>
  </div>
</body>

</html>
