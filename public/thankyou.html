<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Soul Mirror Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text: #1e160e;
      --gold: #9a7230;
      --gold-light: #c4a052;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(circle at 12% 15%, rgba(120, 102, 214, 0.38) 0%, rgba(120, 102, 214, 0) 40%),
        radial-gradient(circle at 85% 10%, rgba(85, 68, 176, 0.3) 0%, rgba(85, 68, 176, 0) 42%),
        linear-gradient(180deg, #6f6ba9 0%, #a09acb 46%, #ddd8ef 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(ellipse 110% 70% at 50% -8%, rgba(8, 12, 35, 0.68) 0%, rgba(8, 12, 35, 0) 68%),
        radial-gradient(ellipse 85% 55% at 15% 20%, rgba(88, 73, 167, 0.26) 0%, transparent 62%),
        radial-gradient(ellipse 70% 45% at 85% 15%, rgba(69, 52, 142, 0.24) 0%, transparent 66%);
      animation: auroraFloat 18s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.65) 1px, transparent 2px),
        radial-gradient(circle at 78% 24%, rgba(232, 201, 122, 0.55) 1px, transparent 2px),
        radial-gradient(circle at 35% 62%, rgba(255, 255, 255, 0.5) 1px, transparent 2px),
        radial-gradient(circle at 88% 72%, rgba(232, 201, 122, 0.45) 1px, transparent 2px),
        radial-gradient(circle at 58% 36%, rgba(255, 255, 255, 0.4) 1px, transparent 2px),
        radial-gradient(circle at 24% 84%, rgba(232, 201, 122, 0.35) 1px, transparent 2px);
      background-size: 220px 220px, 260px 260px, 190px 190px, 240px 240px, 280px 280px, 320px 320px;
      opacity: 0.52;
      animation: dreamTwinkle 7s ease-in-out infinite;
    }

    @keyframes auroraFloat {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      100% {
        transform: translate3d(0, -24px, 0) scale(1.05);
      }
    }

    @keyframes dreamTwinkle {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.72;
      }
    }

    .dream-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .milky-way {
      position: absolute;
      inset: -18%;
      background:
        radial-gradient(ellipse 40% 18% at 52% 45%, rgba(245, 244, 255, 0.28) 0%, rgba(245, 244, 255, 0.08) 42%, rgba(245, 244, 255, 0) 72%),
        radial-gradient(ellipse 48% 22% at 48% 50%, rgba(194, 184, 255, 0.18) 0%, rgba(194, 184, 255, 0.06) 50%, rgba(194, 184, 255, 0) 74%);
      transform: rotate(-24deg);
      filter: blur(2px);
      opacity: 0.78;
      mix-blend-mode: screen;
      animation: milkyDrift 90s linear infinite;
    }

    .dream-orb {
      position: absolute;
      width: 34vmax;
      height: 34vmax;
      border-radius: 50%;
      filter: blur(42px);
      mix-blend-mode: screen;
      opacity: 0.42;
      animation: orbFloat 15s ease-in-out infinite;
    }

    .dream-orb.one {
      background: radial-gradient(circle, rgba(138, 89, 255, 0.72) 0%, rgba(138, 89, 255, 0) 70%);
      top: -10vmax;
      left: -8vmax;
    }

    .dream-orb.two {
      background: radial-gradient(circle, rgba(236, 202, 129, 0.36) 0%, rgba(236, 202, 129, 0) 70%);
      right: -8vmax;
      bottom: -12vmax;
      animation-duration: 19s;
      animation-delay: -3s;
    }

    .dream-sparkles {
      position: absolute;
      inset: -8%;
      transform-origin: 50% 130%;
      animation: skyDrift 140s linear infinite;
      will-change: transform;
    }

    .dream-shooting {
      position: absolute;
      inset: -10%;
      overflow: hidden;
      transform-origin: 50% 130%;
      animation: skyDrift 130s linear infinite;
      will-change: transform;
    }

    .shooting-star {
      position: absolute;
      width: var(--len, 170px);
      height: 1.2px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.12) 35%, rgba(255, 255, 255, 0.78) 86%, rgba(255, 255, 255, 0.95) 100%);
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.85));
      transform: rotate(var(--angle, 33deg));
      transform-origin: left center;
      opacity: 0;
      animation: shootingStar var(--dur, 8s) linear infinite;
      animation-delay: var(--delay, 0s);
    }

    .shooting-star::after {
      content: '';
      position: absolute;
      right: -2px;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 0 9px rgba(255, 255, 255, 0.95);
      transform: translateY(-50%);
    }

    .sparkle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.45);
      animation: starTwinkle var(--dur, 6s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      opacity: 0.42;
    }

    .sparkle.glint {
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.75);
      animation: starTwinkle var(--dur, 4.8s) ease-in-out infinite, starPulse 9s ease-in-out infinite;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-20px) scale(1.08);
      }
    }

    @keyframes starTwinkle {

      0%,
      100% {
        opacity: 0.28;
        transform: scale(0.82);
      }

      50% {
        opacity: 1;
        transform: scale(1.22);
      }
    }

    @keyframes starPulse {

      0%,
      100% {
        filter: brightness(0.9);
      }

      50% {
        filter: brightness(1.25);
      }
    }

    @keyframes skyDrift {
      0% {
        transform: rotate(-2deg) translateX(-3%) translateY(1%);
      }

      100% {
        transform: rotate(3deg) translateX(4%) translateY(-2%);
      }
    }

    @keyframes milkyDrift {
      0% {
        transform: rotate(-24deg) translate3d(-2%, 0, 0);
      }

      100% {
        transform: rotate(-24deg) translate3d(2%, -1%, 0);
      }
    }

    @keyframes shootingStar {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(var(--angle, 33deg)) scaleX(0.5);
      }

      8% {
        opacity: 1;
      }

      24% {
        opacity: 1;
      }

      42% {
        opacity: 0;
        transform: translate3d(var(--dx, 220px), var(--dy, 145px), 0) rotate(var(--angle, 33deg)) scaleX(1);
      }

      100% {
        opacity: 0;
        transform: translate3d(var(--dx, 220px), var(--dy, 145px), 0) rotate(var(--angle, 33deg)) scaleX(1);
      }
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #e8c97a;
      margin-bottom: 24px;
      padding: 8px 22px;
      border: 1px solid rgba(196, 160, 82, 0.6);
      border-radius: 30px;
      background: linear-gradient(135deg, #3b1f6e 0%, #5a3090 100%);
      box-shadow: 0 2px 12px rgba(59, 31, 110, 0.35);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 4vw, 2.4rem);
      font-weight: 700;
      color: #120f1d;
      letter-spacing: 0.04em;
      line-height: 1.2;
      margin-bottom: 16px;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    h1 em {
      font-style: italic;
      color: #b8872f;
      text-shadow: 0 1px 0 rgba(20, 14, 30, 0.2);
    }

    p {
      font-size: 1.15rem;
      line-height: 1.65;
      color: #171323;
      opacity: 0.92;
      margin-bottom: 28px;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.34);
    }

    a {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid var(--gold-light);
      padding-bottom: 2px;
    }

    a:hover {
      opacity: 0.85;
    }

    .redirect-note {
      font-size: 0.98rem;
      opacity: 0.8;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>
  <div class="dream-bg" aria-hidden="true">
    <div class="milky-way"></div>
    <div class="dream-orb one"></div>
    <div class="dream-orb two"></div>
    <div class="dream-shooting" id="dreamShooting"></div>
    <div class="dream-sparkles" id="dreamSparkles"></div>
  </div>

  <div class="wrap">
    <div class="eyebrow">Soul Mirror</div>
    <h1>Your reading is <em>on its way</em></h1>
    <p>Check your inbox for your personalized Soul Mirror Reading. If you do not see it within a few minutes, peek in
      your promotions or spam folder.</p>
    <p class="redirect-note">You will be redirected to the next page in <span id="redirectCountdown">10</span> seconds.
    </p>
    <p><a href="index.html">Back to the reading</a></p>
  </div>

  <script>
    (function initDreamBackground() {
      const sparkleWrap = document.getElementById('dreamSparkles');
      const shootingWrap = document.getElementById('dreamShooting');
      if (!sparkleWrap || !shootingWrap) return;

      const sparkleCount = window.innerWidth < 700 ? 40 : 62;
      for (let i = 0; i < sparkleCount; i++) {
        const dot = document.createElement('span');
        dot.className = 'sparkle';
        dot.style.left = `${Math.random() * 100}%`;
        dot.style.top = `${Math.random() * 100}%`;
        dot.style.setProperty('--dur', `${3.2 + Math.random() * 4.8}s`);
        dot.style.setProperty('--delay', `${Math.random() * 8}s`);
        dot.style.opacity = `${0.2 + Math.random() * 0.65}`;
        const size = 1 + Math.random() * 2.3;
        dot.style.width = `${size}px`;
        dot.style.height = `${size}px`;
        if (Math.random() < 0.14) dot.classList.add('glint');
        sparkleWrap.appendChild(dot);
      }

      const shootingCount = window.innerWidth < 700 ? 4 : 6;
      for (let i = 0; i < shootingCount; i++) {
        const star = document.createElement('span');
        star.className = 'shooting-star';
        const angle = 28 + Math.random() * 14;
        const travel = 170 + Math.random() * 150;
        const rad = angle * (Math.PI / 180);
        const inTopBand = Math.random() < 0.65;
        // Alternate sides so both left and right always get meteors.
        const side = i % 2 === 0 ? 'right' : 'left';
        const xZone = side === 'right'
          ? (74 + Math.random() * 28)
          : (-18 + Math.random() * 26);
        star.style.left = `${xZone}%`;
        star.style.top = inTopBand
          ? `${2 + Math.random() * 20}%`
          : `${80 + Math.random() * 14}%`;
        star.style.setProperty('--angle', `${angle}deg`);
        star.style.setProperty('--dx', `${Math.cos(rad) * travel}px`);
        star.style.setProperty('--dy', `${Math.sin(rad) * travel}px`);
        star.style.setProperty('--len', `${110 + Math.random() * 110}px`);
        star.style.setProperty('--dur', `${5.5 + Math.random() * 8}s`);
        star.style.setProperty('--delay', `${Math.random() * 14}s`);
        shootingWrap.appendChild(star);
      }
    })();

    const salesPageUrl = new URL('sales-page.html', window.location.href).href;
    const countdownEl = document.getElementById('redirectCountdown');
    let secondsLeft = 10;

    const countdownTimer = setInterval(() => {
      secondsLeft -= 1;
      if (countdownEl && secondsLeft >= 0) {
        countdownEl.textContent = String(secondsLeft);
      }
      if (secondsLeft <= 0) {
        clearInterval(countdownTimer);
      }
    }, 1000);

    setTimeout(() => {
      window.location.href = salesPageUrl;
    }, 10000);
  </script>
</body>

</html>
